[package]
name = "panic_abort"
version = "0.0.0"
license = "MIT OR Apache-2.0"
repository = "https://github.com/rust-lang/rust.git"
description = "Implementation of Rust panics via process aborts"
edition = "2024"

[lib]
test = false
bench = false
doc = false

[dependencies]
alloc = { path = "../alloc" }
cfg-if = { version = "1.0", features = ['rustc-dep-of-std'] }
core = { path = "../core" }
compiler_builtins = "0.1.0"

[target.'cfg(not(all(windows, target_env = "msvc")))'.dependencies]
libc = { version = "0.2", default-features = false }

[target.'cfg(target_os = "nanvix")'.dependencies]
sys = { git = "https://github.com/nanvix/nanvix", rev = "5c6c682987205c774ea43eb4b0956993d9e51524", package = "sys", default-features = false, features = [
    "kcall",
    'rustc-dep-of-std',
], public = true }

[lints.rust.unexpected_cfgs]
level = "warn"
check-cfg = ['cfg(bootstrap)', 'cfg(target_os, values("nanvix"))']
